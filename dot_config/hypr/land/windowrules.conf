# https://wiki.hypr.land/Configuring/Window-Rules/

# Floating
windowrule = float 1, match:class ^(engrampa)$
windowrule = float 1, match:title ^(Welcome to JetBrains Rider)$
windowrule = float 1, match:title ^(Welcome to IntelliJ IDEA)$
windowrule = float 1, match:class ^(pavucontrol-qt)$
windowrule = float 1, match:title ^(Starting Unity...)$
windowrule = float 1, match:class ^(unityhub-bin)$

# Transparent
$opacity = 0.95
windowrule = opacity $opacity, match:class ^(Alacritty)$
windowrule = opacity $opacity, match:class ^(com.mitchellh.ghostty)$
windowrule = opacity $opacity, match:class ^(jetbrains-idea)$
windowrule = opacity $opacity, match:class ^(jetbrains-rider)$

# Logout screen background blur
layerrule = blur 1, match:namespace ^(logout_dialog)$

# Global rules
windowrule {
    name = Global Rules
    match:class = ^(.*)$
    persistent_size = 1 # Always remember the size of floating windows
    render_unfocused = 1 # Fix games freezing / not responding when on an unfocused workspace
}
misc:render_unfocused_fps = 60 # Allow unfocused games to run up to 60fps

# Images in Alacritty
windowrule {
    name = ueberzug
    match:class = ^(ueberzug.*)$
    float = 1
    no_anim = 1
    no_initial_focus = 1
}

# Brave/Firefox picture-in-picture
windowrule {
    name = PiP
    match:title = ^(Picture(\s|-)in(\s|-)[Pp]icture)$
    pin = 1
    float = 1
    keep_aspect_ratio = 1
}

# Nextcloud
windowrule {
    name = Nextcloud
    match:class = ^(com.nextcloud.desktopclient.nextcloud)$
    float = 1
    stay_focused = 1
}

# Unity 2019 compiling/importing popups
windowrule {
    name = Unity 2019 Popups
    match:class = ^(Unity)$
    match:title = ^(Importing)$
    match:float = 1
    no_initial_focus = 1
    move = ((monitor_w*0.5)-(window_w*0.5)) (monitor_h*0.07)
}

# Unity 6 popups (fucking ALL of them, including dropdown menus)
windowrule {
    name = Unity 6 Popups
    match:class = ^(Unity)$
    match:title = ^(Unity)$
    match:float = 1
    no_initial_focus = 1
}
