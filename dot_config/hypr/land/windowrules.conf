# Unity 6 floating windows (asset selectors, package manager, etc)
windowrule {
    name = Unity 6 Floating Windows
    match:class = ^(Unity)$
    match:title = negative:^(Unity)$
    match:float = 1
    move = (cursor_x-(window_w)) cursor_y
}
